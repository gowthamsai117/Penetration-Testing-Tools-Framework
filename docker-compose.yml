services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  default:
    name: pentest-network
